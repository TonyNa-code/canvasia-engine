name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Python syntax check
        run: |
          python -m py_compile \
            run_editor.py \
            native_runtime/runtime_player.py \
            native_runtime/build_native_runtime_app.py \
            tools/release/check_editor_signing_readiness.py \
            tools/runtime/run_native_runtime_smoke.py \
            tests/test_ci_workflow_coverage.py \
            tests/test_prepare_preview_release.py \
            tests/test_frontend_action_handlers.py \
            tests/test_frontend_asset_catalog_module.py \
            tests/test_frontend_editor_common_module.py \
            tests/test_frontend_creative_assistant_module.py \
            tests/test_frontend_editor_filters_module.py \
            tests/test_frontend_entrypoint_modules.py \
            tests/test_frontend_editor_mode_module.py \
            tests/test_frontend_preview_save_module.py \
            tests/test_frontend_project_history_module.py \
            tests/test_frontend_project_settings_module.py \
            tests/test_frontend_recent_workspace_module.py \
            tests/test_frontend_release_control_module.py \
            tests/test_frontend_release_version_module.py \
            tests/test_frontend_script_voice_module.py \
            tests/test_frontend_system_dialog_module.py \
            tests/test_frontend_ui_theme_module.py \
            tests/test_frontend_variables_module.py \
            tests/test_frontend_visual_effects_module.py \
            tests/test_run_editor_smoke.py \
            tests/test_native_runtime_render_smoke.py \
            tests/test_browser_playwright_smoke.py

      - name: Frontend syntax check
        run: |
          node --check prototype_editor/modules/asset_catalog.js
          node --check prototype_editor/modules/editor_common.js
          node --check prototype_editor/modules/creative_assistant.js
          node --check prototype_editor/modules/editor_filters.js
          node --check prototype_editor/modules/editor_mode.js
          node --check prototype_editor/modules/preview_save.js
          node --check prototype_editor/modules/project_history.js
          node --check prototype_editor/modules/project_settings.js
          node --check prototype_editor/modules/recent_workspace.js
          node --check prototype_editor/modules/release_control.js
          node --check prototype_editor/modules/release_version.js
          node --check prototype_editor/modules/script_voice.js
          node --check prototype_editor/modules/system_dialog.js
          node --check prototype_editor/modules/ui_theme.js
          node --check prototype_editor/modules/variables.js
          node --check prototype_editor/modules/visual_effects.js
          node --check prototype_editor/app.js
          node --check export_player_template/player.js

      - name: Release tooling tests
        run: |
          python -m unittest discover -s tests -p 'test_ci_workflow_coverage.py' -v
          python -m unittest discover -s tests -p 'test_prepare_preview_release.py' -v
          python -m unittest discover -s tests -p 'test_frontend_action_handlers.py' -v
          python -m unittest discover -s tests -p 'test_frontend_asset_catalog_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_editor_common_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_creative_assistant_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_editor_filters_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_entrypoint_modules.py' -v
          python -m unittest discover -s tests -p 'test_frontend_editor_mode_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_preview_save_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_project_history_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_project_settings_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_recent_workspace_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_release_control_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_release_version_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_script_voice_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_system_dialog_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_ui_theme_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_variables_module.py' -v
          python -m unittest discover -s tests -p 'test_frontend_visual_effects_module.py' -v

      - name: Backend smoke tests
        run: |
          python -m unittest discover -s tests -p 'test_run_editor_smoke.py' -v

      - name: Install native runtime smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r native_runtime/requirements.txt

      - name: Native runtime render smoke tests
        env:
          SDL_AUDIODRIVER: dummy
          SDL_VIDEODRIVER: dummy
        run: |
          python -m unittest discover -s tests -p 'test_native_runtime_render_smoke.py' -v

      - name: Install browser smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Browser Playwright smoke tests
        run: |
          python -m unittest discover -s tests -p 'test_browser_playwright_smoke.py' -v
